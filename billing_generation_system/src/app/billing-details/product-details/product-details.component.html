<form [formGroup]="productForm" (ngSubmit)="onSubmit()">
  <h2 class="form-heading">Product Details</h2>
  <!-- Move formArrayName here -->
  <div formArrayName="products">
    <table mat-table [dataSource]="products.controls" [trackBy]="trackByIndex" class="mat-elevation-z8">
      <!-- S.No Column -->
      <ng-container matColumnDef="sno">
        <th mat-header-cell *matHeaderCellDef> S.No </th>
        <td mat-cell *matCellDef="let element; let i = index">
          {{ i + 1 }}
        </td>
      </ng-container>
      <!-- Product Column -->
      <ng-container matColumnDef="productName">
        <th mat-header-cell *matHeaderCellDef> Product Name </th>
        <td mat-cell *matCellDef="let element; let i = index" [formGroupName]="i">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Select Product</mat-label>
            <mat-select formControlName="productName">
              <mat-option *ngFor="let item of productList" [value]="item">
                {{ item }}
              </mat-option>
            </mat-select>
          </mat-form-field>
        </td>
      </ng-container>
      <!-- Quantity Column -->
      <ng-container matColumnDef="quantity">
        <th mat-header-cell *matHeaderCellDef> Quantity </th>
        <td mat-cell *matCellDef="let element; let i = index" [formGroupName]="i">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Select Qty</mat-label>
            <mat-select formControlName="quantity">
              <mat-option *ngFor="let qty of quantityList" [value]="qty">
                {{ qty }}
              </mat-option>
            </mat-select>
          </mat-form-field>
        </td>
      </ng-container>
      <!-- Amount Column -->
      <ng-container matColumnDef="amount">
        <th mat-header-cell *matHeaderCellDef> Amount </th>
        <td mat-cell *matCellDef="let element; let i = index" [formGroupName]="i">
          <mat-form-field appearance="outline" class="full-width">
            <input matInput formControlName="amount" placeholder="Enter amount">
          </mat-form-field>
        </td>
      </ng-container>
      <!-- Total Amount Column -->
      <ng-container matColumnDef="total_amount">
        <th mat-header-cell *matHeaderCellDef>Total Amount </th>
        <td mat-cell *matCellDef="let element; let i = index" [formGroupName]="i">
          <mat-form-field appearance="outline" class="full-width">
            <input matInput formControlName="total_amount" placeholder="Enter total amount">
          </mat-form-field>
        </td>
      </ng-container>
      <!-- Action Column -->
      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef> Action </th>
        <td mat-cell *matCellDef="let element; let i = index">
          <button mat-icon-button color="warn" type="button" (click)="removeProduct(i)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
  <div class="button-group">
    <!-- Add Product Button -->
    <button value="Add Product" mat-raised-button color="primary" type="button" (click)="addProduct()">
      <mat-icon>add</mat-icon>
      Add Product
    </button>

    <!-- Submit Button -->
    <button mat-raised-button color="accent" type="submit" [disabled]="productForm.invalid">
      Submit
    </button>
  </div>
</form>
